name: Scrape BCP

on:
  schedule:
    # Runs every 2 minutes. The scraper itself decides whether to act
    # based on the round schedule in scripts/schedule.json.
    - cron: "*/2 * * * *"

  # Allow manual trigger from the Actions tab — useful for testing
  # or forcing a refresh outside the scheduled windows.
  workflow_dispatch:
    inputs:
      force:
        description: "Skip time-window check and scrape immediately"
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Skip if triggered by the bot's own commit (prevents infinite loops)
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write   # needed to commit tournament.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Use a token that can push back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        id: scrape
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/scrape_bcp.py $ARGS

      - name: Commit updated tournament.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit if tournament.json actually changed
          if git diff --quiet data/tournament.json; then
            echo "No changes to tournament.json — nothing to commit."
          else
            git add data/tournament.json
            git commit -m "chore: update tournament data [skip ci]"
            git push
          fi
