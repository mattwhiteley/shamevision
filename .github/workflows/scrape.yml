name: Scrape BCP

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Skip time-window check and scrape immediately"
        type: boolean
        default: false

# Only allow one run at a time — cancels any in-progress run if a new one starts
concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Always fetch the latest state of the remote before doing anything
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        id: scrape
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="--force"
          fi
          python scripts/scrape_bcp.py $ARGS

      - name: Commit updated tournament.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/tournament.json; then
            echo "No changes to tournament.json — nothing to commit."
          else
            git add data/tournament.json
            git commit -m "chore: update tournament data [skip ci]"
            git push
          fi
